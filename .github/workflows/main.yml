name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Клонирование репозитория
    - uses: actions/checkout@v3

    # Шаг 2: Построение Docker-образа и загрузка в Docker Hub
    - name: Build and Push Docker Image
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        docker build -t catherineamf/webapp:latest .
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        docker push catherineamf/webapp:latest

    # Шаг 3: Создание Kubernetes-кластера Kind
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1.5.0

    # Шаг 4: Применение манифестов Kubernetes
    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -R -f ./k8s
        kubectl get all # Для проверки созданных ресурсов

    # Шаг 5: Проверка состояния подов
    - name: Check Pod Status
      run: |
        kubectl describe pod -l app=webapp

    # Шаг 6: Сбор логов подов
    - name: Collect Pod Logs
      run: |
        for pod in $(kubectl get pods -o name); do
          echo "Logs for $pod:"
          kubectl logs $pod
        done

    # Шаг 7: Ожидание готовности подов
    - name: Wait for Pods to be Ready
      run: |
        kubectl wait pods --all --for condition=Ready --timeout=120s

    # Шаг 8: Тестирование сервиса
    - name: Port Forward to Web Service
      run: |
        kubectl port-forward service/webapp-service 8080:80 &

    - name: Test Service Functionality
      uses: cypress-io/github-action@v6
      env:
        CYPRESS_BASE_URL: http://localhost:8080
      with:
        working-directory: ./.github/tests

