name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Проверка исходного кода
      - uses: actions/checkout@v3

      # Сборка и публикация Docker-образа
      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker build -t catherineamf/webapp:latest .
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker push catherineamf/webapp:latest

      # Создание Kind-кластера
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.5.0

      # Применение манифестов Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -R -f ./k8s
          kubectl get all
          kubectl describe nodes

      # Проверка состояния подов
      - name: Check Pod Status
        run: |
          kubectl get pods -o wide
          kubectl describe pod -l app=webapp || echo "Pod description failed"

      # Ожидание готовности подов
      - name: Wait for Pods to be Ready
        run: |
          kubectl wait --for=condition=Ready pod -l app=webapp --timeout=300s || kubectl describe pod -l app=webapp

      # Просмотр событий (дополнительная диагностика)
      - name: Check Events
        run: |
          kubectl get events --sort-by='.lastTimestamp'

      # Проброс порта для тестирования
      - name: Port Forward to Web Service
        run: |
          kubectl port-forward service/webapp-service 8080:80 &
          sleep 5

      # Тестирование функциональности сервиса
      - name: Test Service Functionality
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: http://localhost:8080

